name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  lhci:
    name: Lighthouse
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: npm install, build
        run: |
          npm install
          npm run build
      - name: determine Lighthouse URLs
        id: lhci-urls
        shell: bash
        run: |
          set -euo pipefail
          URLS_JSON="$(
            GITHUB_BASE_REF='${{ github.base_ref }}' \
            GITHUB_HEAD_SHA='${{ github.event.pull_request.head.sha }}' \
            bash ./scripts/lhci-urls.sh
          )"
          echo "urls_json=${URLS_JSON}" >> "$GITHUB_OUTPUT"
      - name: run Lighthouse CI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @lhci/cli@0.15.x
          BASE_URL="http://127.0.0.1:4173"
          mapfile -t URLS < <(echo '${{ steps.lhci-urls.outputs.urls_json }}' | jq -r '.[]')
          ARGS=()
          for url in "${URLS[@]}"; do
            ARGS+=("--collect.url=${BASE_URL}${url}")
          done
          lhci autorun \
            --config=./lighthouserc.json \
            --collect.startServerCommand="npm run preview:ci" \
            --collect.startServerReadyPattern="Local" \
            --collect.startServerReadyTimeout=30000 \
            "${ARGS[@]}"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
